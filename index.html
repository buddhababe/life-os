<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a1a">
<title>Life OS — The One</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- AUTH OVERLAY -->
<div id="auth-overlay" class="auth-overlay hidden">
  <div class="auth-card glass">
    <div class="auth-logo">☯</div>
    <h1>Life OS</h1>
    <p class="auth-sub">위효연 · The One을 향한 여정</p>
    <button id="google-signin-btn" class="btn-primary btn-google">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google로 로그인 (다기기 동기화)
    </button>
    <button id="local-btn" class="btn-secondary">기기 내 저장으로 시작</button>
    <p class="auth-note">Google 로그인 시 모든 기기에서 동기화됩니다</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app hidden">

  <!-- HEADER -->
  <header class="header glass">
    <div class="header-left">
      <span id="header-date" class="header-date"></span>
      <span id="header-ganjio" class="ganjio-badge"></span>
    </div>
    <div class="header-right">
      <div id="energy-ring" class="energy-ring" title="오늘 용신 에너지"></div>
      <button id="sync-btn" class="icon-btn" title="동기화">⟳</button>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <main id="page-content" class="page-content"></main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav glass" id="bottom-nav">
    <button class="nav-btn active" data-page="home"><span class="nav-icon">🏠</span><span class="nav-label">홈</span></button>
    <button class="nav-btn" data-page="habits"><span class="nav-icon">✅</span><span class="nav-label">습관</span></button>
    <button class="nav-btn" data-page="mandarat"><span class="nav-icon">🎯</span><span class="nav-label">만다라트</span></button>
    <button class="nav-btn" data-page="saju"><span class="nav-icon">☯</span><span class="nav-label">사주</span></button>
    <button class="nav-btn" data-page="journal"><span class="nav-icon">📓</span><span class="nav-label">저널</span></button>
    <button class="nav-btn" data-page="more"><span class="nav-icon">···</span><span class="nav-label">더보기</span></button>
  </nav>
</div>

<!-- SW -->
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
<!-- MODULES -->
<script type="module" src="js/firebase-init.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
