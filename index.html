<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060612">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>The One — Life OS</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="splash">
  <div class="splash-inner">
    <div class="identity-glyph">☯</div>
    <div class="identity-title">The One</div>
    <div class="identity-sub" id="splash-name">Charlie Wi</div>
  </div>
</div>

<!-- AUTH -->
<div id="auth" class="screen hidden">
  <div class="auth-wrap">
    <div class="identity-glyph">☯</div>
    <h1 class="auth-title">Life OS</h1>
    <p class="auth-desc">자가진화형 인생 개선 시스템</p>
    <div class="identity-card">
      <div class="ic-label">정체성 선언</div>
      <div class="ic-text" id="auth-declaration">"나는 Charlie Wi 무생이다.<br>나는 The One이다.<br>오늘의 모든 행동은<br>그 정체성의 표현이다."</div>
    </div>
    <button id="btn-google" class="btn-auth google">
      <svg width="18" height="18" viewBox="0 0 24 24" style="margin-right:8px"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google로 시작 (다기기 동기화)
    </button>
    <button id="btn-local" class="btn-auth local">이 기기에서만 사용</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="screen hidden">

  <!-- HEADER -->
  <header class="app-header">
    <div class="ah-left">
      <div id="hdr-date" class="hdr-date"></div>
      <div id="hdr-ganjio" class="hdr-badge"></div>
    </div>
    <div class="ah-right">
      <div id="streak-display" class="streak-display"></div>
    </div>
  </header>

  <!-- PAGE -->
  <main id="page" class="page"></main>

  <!-- NAV -->
  <nav class="app-nav">
    <button class="nav-item active" data-tab="gate">
      <div class="ni-icon">🌅</div>
      <div class="ni-label">게이트</div>
    </button>
    <button class="nav-item" data-tab="core">
      <div class="ni-icon">⚡</div>
      <div class="ni-label">핵심</div>
    </button>
    <button class="nav-item" data-tab="reflect">
      <div class="ni-icon">🌙</div>
      <div class="ni-label">성찰</div>
    </button>
    <button class="nav-item" data-tab="evolve">
      <div class="ni-icon">📈</div>
      <div class="ni-label">진화</div>
    </button>
  </nav>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
    navigator.serviceWorker.register('firebase-messaging-sw.js');
  }
</script>
<script type="module" src="js/main.js"></script>
</body>
</html>
